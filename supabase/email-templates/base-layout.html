<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Agent Hub</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
        sans-serif;
      -webkit-font-smoothing: antialiased;
    "
  >
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f1f5f9; padding: 40px 16px">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 560px;
              background-color: #ffffff;
              border-radius: 12px;
              border: 1px solid #e2e8f0;
              overflow: hidden;
              box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
            "
          >
            <tr>
              <td
                style="
                  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
                  padding: 28px 32px;
                  text-align: center;
                "
              >
                <div
                  style="
                    display: inline-block;
                    width: 44px;
                    height: 44px;
                    line-height: 44px;
                    border-radius: 10px;
                    background-color: rgba(255, 255, 255, 0.15);
                    color: #ffffff;
                    font-size: 18px;
                    font-weight: 700;
                  "
                >
                  AH
                </div>
                <h1 style="margin: 12px 0 0; color: #ffffff; font-size: 22px; font-weight: 700">Agent Hub</h1>
                <p style="margin: 6px 0 0; color: #dbeafe; font-size: 13px">Performance Engineering Workspace</p>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px">
                {{BODY}}
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 20px 32px;
                  background-color: #f8fafc;
                  border-top: 1px solid #e2e8f0;
                  text-align: center;
                "
              >
                <p style="margin: 0; color: #94a3b8; font-size: 12px">Sent by Agent Hub · Mechlin Technologies</p>
                <p style="margin: 8px 0 0; color: #cbd5e1; font-size: 11px">
                  <a href="https://agenthub.mechlintech.com" style="color: #64748b; text-decoration: none"
                    >agenthub.mechlintech.com</a
                  >
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
