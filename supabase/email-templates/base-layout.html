<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Agent Hub</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
        sans-serif;
      -webkit-font-smoothing: antialiased;
    "
  >
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f1f5f9; padding: 40px 16px">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 560px;
              background-color: #ffffff;
              border-radius: 12px;
              border: 1px solid #e2e8f0;
              overflow: hidden;
              box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
            "
          >
            <tr>
              <td
                style="
                  background: linear-gradient(135deg, #6d28d9 0%, #9333ea 100%);
                  padding: 28px 32px;
                  text-align: center;
                "
              >
                <div style="display: inline-block; line-height: 0">
                  <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 32 32" fill="none" aria-hidden="true">
                    <defs>
                      <linearGradient id="agent-hub-bg" x1="6" y1="4" x2="26" y2="28" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#6d28d9"/>
                        <stop offset="1" stop-color="#9333ea"/>
                      </linearGradient>
                    </defs>
                    <rect width="32" height="32" rx="8" fill="url(#agent-hub-bg)"/>
                    <circle cx="16" cy="16" r="8" stroke="white" stroke-width="1.15" opacity="0.22"/>
                    <g stroke="white" stroke-width="1.75" stroke-linecap="round">
                      <line x1="16" y1="6.5" x2="16" y2="10.5" opacity="0.85"/>
                      <line x1="16" y1="21.5" x2="16" y2="25.5" opacity="0.45"/>
                      <line x1="6.5" y1="16" x2="10.5" y2="16" opacity="0.55"/>
                      <line x1="21.5" y1="16" x2="25.5" y2="16" opacity="0.55"/>
                    </g>
                    <circle cx="16" cy="6.5" r="1.55" fill="white" opacity="0.8"/>
                    <circle cx="16" cy="16" r="3.5" fill="white"/>
                  </svg>
                </div>
                <h1 style="margin: 12px 0 0; color: #ffffff; font-size: 22px; font-weight: 700">Agent Hub</h1>
                <p style="margin: 6px 0 0; color: #dbeafe; font-size: 13px">Performance Engineering Workspace</p>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px">
                {{BODY}}
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 20px 32px;
                  background-color: #f8fafc;
                  border-top: 1px solid #e2e8f0;
                  text-align: center;
                "
              >
                <p style="margin: 0; color: #94a3b8; font-size: 12px">Sent by Agent Hub · Mechlin Technologies</p>
                <p style="margin: 8px 0 0; color: #cbd5e1; font-size: 11px">
                  <a href="https://agenthub.mechlintech.com" style="color: #64748b; text-decoration: none"
                    >agenthub.mechlintech.com</a
                  >
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
