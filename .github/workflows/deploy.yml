name: Build & Deploy

on:
  push:
    branches:
      - main
      - production

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/main'

    runs-on: self-hosted

    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set Docker Tag
        shell: powershell
        run: |
          "TAG=dev-$($env:GITHUB_SHA.Substring(0,7))" >> $env:GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build `
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" `
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" `
            -f docker/Dockerfile `
            -t akshatpareek/agenthub:${{ env.TAG }} `
            -t akshatpareek/agenthub:dev-latest `
            .

      - name: Push
        run: |
          docker push akshatpareek/agenthub:${{ env.TAG }}
          docker push akshatpareek/agenthub:dev-latest

      - name: Pull Dev Image
        run: docker compose -f docker/docker-compose.dev.yml pull

      - name: Deploy Dev
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          docker compose -f docker/docker-compose.dev.yml up -d --force-recreate

      - name: Cleanup
        run: docker image prune -f

  deploy-prod:
    if: github.ref == 'refs/heads/production'

    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set Docker Tag
        shell: powershell
        run: |
          "TAG=prod-$($env:GITHUB_SHA.Substring(0,7))" >> $env:GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build `
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" `
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" `
            -f docker/Dockerfile `
            -t akshatpareek/agenthub:${{ env.TAG }} `
            -t akshatpareek/agenthub:prod-latest `
            .

      - name: Push
        run: |
          docker push akshatpareek/agenthub:${{ env.TAG }}
          docker push akshatpareek/agenthub:prod-latest

      - name: Pull Prod Image
        run: docker compose -f docker/docker-compose.prod.yml pull

      - name: Deploy Prod
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          docker compose -f docker/docker-compose.prod.yml up -d --force-recreate

      - name: Cleanup
        run: docker image prune -f